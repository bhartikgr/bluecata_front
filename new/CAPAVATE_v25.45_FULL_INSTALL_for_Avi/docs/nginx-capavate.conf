# Capavate v23.4.3 — Reference nginx configuration
#
# v23.4.3 switched the SPA from hash-based routing (URLs with `/#/`) to
# BrowserRouter (clean URLs). This means nginx must serve `index.html`
# for any path that doesn't match a static file, so deep links and
# bookmarks work correctly.
#
# Drop this into /etc/nginx/conf.d/ (or your equivalent) and adjust:
#   - server_name <your domain>
#   - ssl certs paths
#   - upstream port if you changed PORT in .env from the default 5000
#
# Reload with: `sudo nginx -t && sudo systemctl reload nginx`

upstream capavate_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name capavate.com www.capavate.com;
    # Redirect all HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name capavate.com www.capavate.com;

    # TLS — adjust paths to your certbot / Let's Encrypt setup.
    ssl_certificate     /etc/letsencrypt/live/capavate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/capavate.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Max body size — needs to be larger than your largest dataroom upload.
    client_max_body_size 50M;

    # Critical for BrowserRouter: API routes proxy to Node, everything else
    # falls back to the SPA shell.

    # 1. API routes — proxy to Node directly.
    location /api/ {
        proxy_pass http://capavate_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 2. Server-sent events stream — needs no buffering and longer timeout.
    location /api/events/stream {
        proxy_pass http://capavate_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }

    # 3. Webhooks (payment gateway, bridge) — proxy raw body, no buffering.
    location /api/webhooks/ {
        proxy_pass http://capavate_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_request_buffering off;
    }

    # 4. Static assets (built JS/CSS) — long cache, served from Node.
    location ~* \.(js|css|woff2?|ttf|otf|png|jpg|jpeg|gif|svg|ico|webp)$ {
        proxy_pass http://capavate_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 5. Everything else — SPA shell. This is the BrowserRouter rule:
    #    if the request is for a path the SPA owns (e.g. /founder/dashboard),
    #    serve index.html and let React Router handle it client-side.
    location / {
        proxy_pass http://capavate_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # The Node server (in production mode) already serves index.html for
        # any unmatched route via serveStatic — so this proxy_pass is enough.
        # No try_files needed because Node owns the fallback.
    }
}

# ---------------------------------------------------------------------------
# Caddy equivalent (if you use Caddy instead of nginx)
# ---------------------------------------------------------------------------
#
# capavate.com {
#     tls /etc/ssl/capavate/fullchain.pem /etc/ssl/capavate/privkey.pem
#     encode gzip
#     reverse_proxy localhost:5000 {
#         flush_interval -1
#     }
# }
#
# Caddy reverse_proxy handles SPA fallback automatically — no try_files needed.
